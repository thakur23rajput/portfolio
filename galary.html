<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>School Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
	<style>
	  *{
		margin:0;
		padding:0;
		box-sizing:border-box;
		font-family:'Poppins',sans-serif;
	  }
	  body{
		background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
		color:white;
		padding:30px 15px;
	  }
	  /* Title */
	  h1{
		text-align:center;
		margin:40px 0 20px;
		font-weight:600;
		letter-spacing:1px;
	  }
	/* Gallery Grid */
	  .gallery-container{
		max-width:1200px;
		margin:auto;
		display:grid;
		grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
		gap:20px;
	  }
	/* Card Style */
	  .gallery-item{
		position:relative;
		overflow:hidden;
		border-radius:15px;
		cursor:pointer;
		backdrop-filter:blur(10px);
		background:rgba(255,255,255,0.08);
		box-shadow:0 8px 25px rgba(0,0,0,0.4);
		transition:0.4s ease;
	  }
	  .gallery-item:hover{
		transform:translateY(-8px) scale(1.02);
		box-shadow:0 15px 35px rgba(0,0,0,0.6);
	  }
	  .gallery-item img{
		width:100%;
		height:220px;
		object-fit:cover;
		transition:0.5s;
	  }
	  .gallery-item:hover img{
		transform:scale(1.15);
	  }
	/*Caption overlay*/
	  .caption{
		position:absolute;
		bottom:0;
		width:100%;
		padding:12px;
		background:linear-gradient(transparent,rgba(0,0,0,0.8));
		text-align:center;
		font-size:14px;
		opacity:0;
		transition:0.4s;
	  }
	  .gallery-item:hover .caption{
		opacity:1;
	  }
	/* Modal */
	  .modal{
		position:fixed;
		top:0;
		left:0;
		width:100%;
		height:100%;
		background:rgba(0,0,0,0.9);
		display:flex;
		justify-content:center;
		align-items:center;
		visibility:hidden;
		opacity:0;
		transition:0.4s;
		z-index:999;
	  }
	  .modal.show{
		visibility:visible;
		opacity:1;
	  }
	  .modal img{
		max-width:90%;
		max-height:90%;
		border-radius:12px;
		animation:zoom 0.4s ease;
	  }
	  @keyframes zoom{
		from{transform:scale(0.7); opacity:0;}
		to{transform:scale(1); opacity:1;}
	  }
	/* Close Button */
	  .close{
		position:absolute;
		top:20px;
		right:30px;
		font-size:35px;
		color:white;
		cursor:pointer;
	  }
	</style>
</head>
<body>
  <h1>School Building</h1>
	<div class="gallery-container">
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567524542-e2135eea-0612-48be-96cc-882661477b3d.jpg">
	<div class="caption">School Building View 1</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567498745-4c8ee876-d178-4327-a3b5-b366884173c1.jpg">
	<div class="caption">School Building View 2</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567544883-eac4eadf-447b-49b3-b816-da84c9b09542.jpg">
	<div class="caption">School Building View 3</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567565116-6f9633a2-9846-48c5-a44e-859b0f346b8c.jpg">
	<div class="caption">School Building View 4</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567588574-eeb65c6c-8925-483e-adbb-dca65a505cdf.jpg">
	<div class="caption">School Building View 5</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567613404-e977a8d5-b51c-4a27-97e4-0a2487b07936.jpg">
	<div class="caption">School Building View 6</div>
	</div>
	</div>
  <h1>Class Rooms</h1>
	<div class="gallery-container">
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567643215-af839335-42a2-48ea-8ba3-747c56bb6a85.jpg">
	<div class="caption">Class Room 1</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567670053-531b631c-35ea-403f-bcf9-5443aace9263.jpg">
	<div class="caption">Class Room 2</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567693183-21de507a-483d-4d68-87c7-b3361a2dd485.jpg">
	<div class="caption">Class Room 3</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567709940-a82bcd33-5d9c-49ae-b7af-667858d3952e.jpg">
	<div class="caption">Class Room 4</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567734837-244fce3f-b75f-4801-876d-336bffc84472.jpg">
	<div class="caption">Class Room 5</div>
	</div>
	<div class="gallery-item">
	<img src="https://image2url.com/images/1762567750440-a4ea2e7b-26dd-4a8f-a8dc-19dc79b8a7a3.jpg">
	<div class="caption">Class Room 6</div>
	</div>
	</div>
<!-- Modal -->
	<div class="modal" id="modal">
	<span class="close">&times;</span>
	<img id="modalImg">
	</div>
<script>
	const modal = document.getElementById("modal");
	const modalImg = document.getElementById("modalImg");
	const closeBtn = document.querySelector(".close");
	document.querySelectorAll(".gallery-item img").forEach(img=>{
	img.onclick=()=>{
    modal.classList.add("show");
    modalImg.src=img.src;
	}
	});
	closeBtn.onclick=()=> modal.classList.remove("show");
	modal.onclick=e=>{
	if(e.target===modal) modal.classList.remove("show");
	};
	document.addEventListener("keydown",e=>{
	if(e.key==="Escape") modal.classList.remove("show");
	});
</script>
</body>
</html>
